version: 2
updates:
  # NPM dependency updates
  - package-ecosystem: "npm"
    directory: "/naar-noor"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Mostafa-SAID7"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "build(npm)"
      include: "scope"

  # NuGet dependency updates
  - package-ecosystem: "nuget"
    directory: "/api-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Mostafa-SAID7"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "build(nuget)"
      include: "scope"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
