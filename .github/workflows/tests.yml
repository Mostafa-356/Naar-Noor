name: Tests & Coverage

# Requirement 2.1: Automated testing on every pull request
# Trigger on push and pull_request events to main and develop branches
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # TASK 2.1: Backend Test Job
  # Runs .NET tests with Coverlet coverage collection
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup .NET 8.0
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore api-server/NaarNoor.sln
      
      # Build projects
      - name: Build projects
        run: dotnet build api-server/NaarNoor.sln --no-restore --configuration Release
      
      # Run tests with Coverlet coverage collection using coverlet.runsettings
      - name: Run tests with coverage
        run: |
          dotnet test api-server/NaarNoor.sln \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --settings:coverlet.runsettings \
            --logger:"console;verbosity=detailed" \
            --logger:"trx;LogFileName=test-results.trx" \
            --results-directory:./test-results
      
      # Upload backend test results for artifact collection
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            api-server/tests/*/TestResults/**/*.trx
            test-results/**/*.trx
          retention-days: 30
          if-no-files-found: ignore
      
      # Upload coverage reports for artifact collection
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-reports
          path: |
            api-server/tests/*/TestResults/**/*.cobertura.xml
            test-results/**/*.cobertura.xml
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # TASK 2.2: Frontend Test Job
  # Runs Angular/Jasmine tests with Istanbul coverage
  # Runs in parallel with backend job
  # ============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup Node.js 18.x
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: 'naar-noor/package-lock.json'
      
      # Install dependencies with npm ci from ./naar-noor directory
      - name: Install dependencies
        run: npm ci
        working-directory: naar-noor
      
      # Run tests with coverage using npm run test:ci
      # Note: If test:ci script doesn't exist, tests should be configured to generate coverage
      - name: Run tests with coverage
        run: npm run test:ci 2>&1 || npm run test -- --watch=false --code-coverage
        working-directory: naar-noor
        continue-on-error: true
      
      # Upload frontend test results
      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            naar-noor/coverage/**/*
            naar-noor/test-results/**/*
          retention-days: 30
          if-no-files-found: ignore
      
      # Upload frontend coverage XML for coverage gate
      - name: Upload frontend coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-xml
          path: |
            naar-noor/coverage/**/*.xml
            naar-noor/coverage-final.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # TASK 2.3 & 2.4 & 2.5: Coverage Gate Job with PR Comment
  # Depends on both backend-tests and frontend-tests
  # Validates coverage thresholds per layer
  # Uploads artifacts and posts PR comments
  # ============================================================================
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      # Checkout code to access scripts
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ========================================================================
      # TASK 2.4: Artifact Collection - Download Coverage
      # ========================================================================
      
      # Download backend test results (TRX files)
      - name: Download backend test results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: ./backend-test-results
        continue-on-error: true
      
      # Download backend coverage reports (*.cobertura.xml)
      - name: Download backend coverage reports
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-reports
          path: ./backend-coverage
        continue-on-error: true
      
      # Download frontend test results
      - name: Download frontend test results
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-results
          path: ./frontend-test-results
        continue-on-error: true
      
      # Download frontend coverage reports
      - name: Download frontend coverage reports
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-xml
          path: ./frontend-coverage
        continue-on-error: true
      
      # Setup Python for coverage validation scripts
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Make Python scripts executable
      - name: Make scripts executable
        run: |
          chmod +x scripts/validate-coverage.py
          chmod +x scripts/generate-coverage-report.py
          chmod +x scripts/generate-coverage-badge.py
          chmod +x scripts/generate-pr-comment.py
        continue-on-error: true
      
      # ========================================================================
      # TASK 2.3: Coverage Gate - Validate Backend Coverage
      # Validate backend coverage with per-layer thresholds:
      # Domain 85%, App 82%, Infra 78%, API 80%
      # ========================================================================
      
      - name: Validate backend coverage thresholds
        id: backend-coverage
        run: |
          python scripts/validate-coverage.py \
            --backend \
            --backend-dir "api-server/tests" \
            --output backend-report.json 2>&1 || true
          
          if [ -f backend-report.json ]; then
            echo "Backend report generated"
            cat backend-report.json
          else
            echo "{\"passed\": false, \"backend\": {\"passed\": false, \"results\": {}}}" > backend-report.json
          fi
        continue-on-error: true
      
      # ========================================================================
      # TASK 2.3: Coverage Gate - Validate Frontend Coverage
      # Uses npm run coverage:check from naar-noor directory
      # ========================================================================
      
      - name: Validate frontend coverage thresholds
        id: frontend-coverage
        run: |
          cd naar-noor
          npm run coverage:check 2>&1 || FRONTEND_RESULT=$?
          cd ..
          
          if [ $FRONTEND_RESULT -eq 0 ]; then
            echo "{\"passed\": true, \"frontend\": {\"passed\": true}}" > frontend-report.json
          else
            echo "{\"passed\": false, \"frontend\": {\"passed\": false}}" > frontend-report.json
          fi
        continue-on-error: true
      
      # Generate detailed coverage report
      - name: Generate coverage comparison report
        id: coverage-report
        run: |
          python scripts/generate-coverage-report.py \
            --backend-report backend-report.json \
            --frontend-report frontend-report.json \
            --output coverage-summary.md 2>&1 || true
          
          if [ ! -f coverage-summary.md ]; then
            echo "# Coverage Report\n\nReport generation in progress..." > coverage-summary.md
          fi
        continue-on-error: true
      
      # Parse coverage results and set gate status
      - name: Check coverage gates
        id: gate-check
        run: |
          set +e
          
          BACKEND_PASS=$(python3 << 'EOF'
          import json
          try:
            with open('backend-report.json') as f:
              data = json.load(f)
              print('true' if data.get('passed', False) else 'false')
          except:
            print('false')
          EOF
          )
          
          FRONTEND_PASS=$(python3 << 'EOF'
          import json
          try:
            with open('frontend-report.json') as f:
              data = json.load(f)
              print('true' if data.get('passed', False) else 'false')
          except:
            print('false')
          EOF
          )
          
          echo "backend-pass=$BACKEND_PASS" >> $GITHUB_OUTPUT
          echo "frontend-pass=$FRONTEND_PASS" >> $GITHUB_OUTPUT
          
          if [ "$BACKEND_PASS" = "true" ] && [ "$FRONTEND_PASS" = "true" ]; then
            echo "gate-status=passed" >> $GITHUB_OUTPUT
          else
            echo "gate-status=failed" >> $GITHUB_OUTPUT
          fi
          
          echo "Backend: $BACKEND_PASS, Frontend: $FRONTEND_PASS"
      
      # Generate coverage badges
      - name: Generate coverage badges
        id: badge-generation
        run: |
          mkdir -p ./coverage-badges
          python scripts/generate-coverage-badge.py \
            --backend-report backend-report.json \
            --frontend-report frontend-report.json \
            --output ./coverage-badges 2>&1 || true
        continue-on-error: true
      
      # ========================================================================
      # TASK 2.4: Artifact Collection - Upload Coverage Analysis Artifacts
      # (test results and coverage XML already uploaded from test jobs)
      # ========================================================================
      
      # Upload coverage badges generated from coverage analysis
      - name: Upload coverage badges
        if: always() && steps.badge-generation.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badges
          path: ./coverage-badges/**/*
          retention-days: 30
          if-no-files-found: ignore
      
      # Upload coverage summary report
      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-report
          path: coverage-summary.md
          retention-days: 30
          if-no-files-found: ignore
      
      # ========================================================================
      # TASK 2.5: PR Comment
      # Post GitHub action comment with:
      # - Test status (pass/fail with counts)
      # - Coverage summary per layer
      # - Coverage vs. threshold comparison table
      # - Link to detailed coverage report
      # - Actionable feedback if failing
      # ========================================================================
      
      - name: Generate PR comment
        id: generate-pr-comment
        if: github.event_name == 'pull_request'
        run: |
          python scripts/generate-pr-comment.py \
            --backend-report backend-report.json \
            --frontend-report frontend-report.json \
            --backend-pass "${{ steps.gate-check.outputs.backend-pass }}" \
            --frontend-pass "${{ steps.gate-check.outputs.frontend-pass }}" \
            --output pr-comment.md 2>&1 || true
          
          if [ ! -f pr-comment.md ]; then
            cat > pr-comment.md << 'COMMENT'
          # 🧪 Coverage Gates Report
          
          ## Status
          - Backend Tests: ⚙️ Processing
          - Frontend Tests: ⚙️ Processing
          - Coverage Gate: ⚙️ Processing
          
          ## Coverage Summary
          Coverage validation is in progress. Check workflow logs for details.
          COMMENT
          fi
        continue-on-error: true
      
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              let comment = '';
              if (fs.existsSync('pr-comment.md')) {
                comment = fs.readFileSync('pr-comment.md', 'utf8');
              } else {
                comment = '# 🧪 Coverage Gates Report\n\nCoverage validation results will appear here.';
              }
              
              // Find existing bot comment to update
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              
              const existingComment = comments.find(c =>
                c.body.includes('Coverage Gates') &&
                c.user.type === 'Bot'
              );
              
              if (existingComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  comment_id: existingComment.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
                console.log('Updated existing PR comment');
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
                console.log('Created new PR comment');
              }
            } catch(e) {
              console.error('Error posting PR comment:', e.message);
            }
      
      # Fail workflow if coverage gates did not pass
      - name: Fail if coverage gates did not pass
        if: steps.gate-check.outputs.gate-status == 'failed'
        run: |
          echo "❌ Coverage gates failed"
          echo ""
          echo "Thresholds:"
          echo "  - Domain: 85%"
          echo "  - App: 82%"
          echo "  - Infra: 78%"
          echo "  - API: 80%"
          echo "  - Services: 80%"
          echo "  - Components: 75%"
          echo ""
          if [ -f coverage-summary.md ]; then
            cat coverage-summary.md
          fi
          exit 1
