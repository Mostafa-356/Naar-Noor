name: Secret Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    name: Gitleaks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  truffleHog:
    runs-on: ubuntu-latest
    name: TruffleHog
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

  detect-secrets:
    runs-on: ubuntu-latest
    name: Detect Secrets
    steps:
      - uses: actions/checkout@v4

      - name: Run Detect Secrets
        uses: trufflesecurity/detect-secrets@main
        with:
          path: ./
          args: --all-files --force-use-all-plugins
